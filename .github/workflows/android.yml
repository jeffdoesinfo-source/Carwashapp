name: Android Release Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode keystore (if provided)
        if: secrets.ANDROID_KEYSTORE_BASE64
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
          echo "Keystore written to android/keystore.jks"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      - name: Create signing properties (if provided)
        if: secrets.KEYSTORE_PASSWORD && secrets.KEY_ALIAS
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Android SDK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
      - name: Build release AAB (signed if keystore provided)
        run: |
          cd android
          if [ -f keystore.jks ]; then
            ./gradlew bundleRelease --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/**/*
