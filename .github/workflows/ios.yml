name: iOS Build (macOS runner)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CocoaPods
        run: sudo gem install cocoapods
      - name: Install pods
        working-directory: ios/App
        run: pod install || true
      - name: Import signing certificate and provisioning profile (if provided)
        if: secrets.IOS_P12_BASE64 && secrets.IOS_MOBILEPROVISION_BASE64
        run: |
          echo "$IOS_P12_BASE64" | base64 --decode > /tmp/certs.p12
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          security create-keychain -p actions ios-build.keychain || true
          security import /tmp/certs.p12 -k ~/Library/Keychains/ios-build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign || true
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      - name: Build (placeholder)
        run: |
          echo "This job is a starting template. Configure code signing and schemes before running."
          echo "To archive locally: open ios/App/App.xcworkspace in Xcode and set signing."
